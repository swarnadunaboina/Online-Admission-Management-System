version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: admission_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: admission_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - admission_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admission_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/admission_db
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      UPLOAD_DEST: ./uploads
      MAX_FILE_SIZE: 10485760
      NODE_ENV: production
    ports:
      - '5000:5000'
    volumes:
      - uploads_data:/app/uploads
    networks:
      - admission_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: admission_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_APP_NAME: AdmissionsHub
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    networks:
      - admission_net

volumes:
  mongo_data:
  uploads_data:

networks:
  admission_net:
    driver: bridge
